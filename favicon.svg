<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Backdrop -->
  <rect width="120" height="120" rx="28" fill="#0a0205"/>
  <!-- Glow Behind Bottle -->
  <circle cx="60" cy="65" r="45" fill="#6e1324" opacity="0.3" filter="blur(5px)" />
  
  <!-- Cap (Round Crystal) -->
  <circle cx="60" cy="32" r="14" fill="#c8a050" />
  <polygon points="56,22 64,22 61,40 59,40" fill="#fff" opacity="0.4"/>
  
  <!-- Neck / Spray trigger -->
  <rect x="48" y="44" width="24" height="6" rx="3" fill="#88682a" />
  <rect x="52" y="48" width="16" height="8" fill="#e8c87d" />
  
  <!-- Body of Bottle -->
  <path d="M42 56 L78 56 C 85 56, 92 80, 95 96 C 96 102, 92 106, 85 106 L35 106 C 28 106, 24 102, 25 96 C 28 80, 35 56, 42 56 Z" fill="#6e1324" stroke="#c8a050" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Liquid Highlight -->
  <path d="M46 62 L74 62 C 78 62, 84 80, 86 94 C 86.5 98, 84 100, 80 100 L40 100 C 36 100, 33.5 98, 34 94 C 36 80, 42 62, 46 62 Z" fill="#a81a38" opacity="0.7"/>
  
  <!-- Gold Premium Label -->
  <rect x="38" y="72" width="44" height="20" rx="3" fill="#c8a050" />
  <rect x="40" y="74" width="40" height="16" rx="2" fill="#000" opacity="0.1" />
  <text x="60" y="86" font-family="'Georgia', serif" font-size="11" font-weight="bold" fill="#0e0608" text-anchor="middle" letter-spacing="1">DAGU</text>
  
  <!-- Sparkles -->
  <path d="M20 25 L23 35 L33 38 L23 41 L20 51 L17 41 L7 38 L17 35 Z" fill="#c8a050" transform="scale(0.7) translate(10, -5)" />
  <path d="M90 20 L92 26 L98 28 L92 30 L90 36 L88 30 L82 28 L88 26 Z" fill="#c8a050" transform="scale(0.8) translate(30, -5)" />
</svg>
